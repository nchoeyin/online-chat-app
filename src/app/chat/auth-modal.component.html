@if (ui.authModalOpen()) {
  <div
    (click)="onBackdropClick($event)"
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4 backdrop-blur-sm"
    role="dialog"
    aria-modal="true"
    aria-labelledby="auth-modal-title"
  >
    <div
      class="relative w-full max-w-md rounded-3xl bg-cp-bg-2 p-8 shadow-2xl"
      (click)="$event.stopPropagation()"
    >
      <button
        type="button"
        (click)="ui.closeAuth()"
        class="absolute right-4 top-4 rounded-md p-1.5 text-cp-muted transition hover:bg-cp-bg-3 hover:text-cp-text"
        aria-label="Close"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>

      <h2
        id="auth-modal-title"
        class="mt-2 text-center text-[26px] font-semibold tracking-tight text-cp-text"
      >
        Log in or sign up
      </h2>
      <p class="mx-auto mt-2 max-w-[300px] text-center text-sm text-cp-muted">
        You'll get smarter responses and can upload files, images, and more.
      </p>

      <div class="mt-6 space-y-3">
        <button
          type="button"
          (click)="continueWith('google')"
          class="flex h-12 w-full items-center justify-center gap-3 rounded-full bg-black text-[15px] font-medium text-white transition hover:bg-[#1a1a1a]"
        >
          <svg viewBox="0 0 24 24" class="h-5 w-5">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Continue with Google
        </button>

        <button
          type="button"
          (click)="continueWith('apple')"
          class="flex h-12 w-full items-center justify-center gap-3 rounded-full bg-black text-[15px] font-medium text-white transition hover:bg-[#1a1a1a]"
        >
          <svg viewBox="0 0 384 512" fill="currentColor" class="h-5 w-5">
            <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z" />
          </svg>
          Continue with Apple
        </button>

        <button
          type="button"
          (click)="continueWith('phone')"
          class="flex h-12 w-full items-center justify-center gap-3 rounded-full bg-black text-[15px] font-medium text-white transition hover:bg-[#1a1a1a]"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
          </svg>
          Continue with phone
        </button>
      </div>

      <div class="my-6 flex items-center gap-4">
        <div class="h-px flex-1 bg-cp-border"></div>
        <span class="text-xs uppercase tracking-wider text-cp-muted">OR</span>
        <div class="h-px flex-1 bg-cp-border"></div>
      </div>

      <form (ngSubmit)="continueWith('email')" class="space-y-3">
        <input
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          placeholder="Email address"
          autocomplete="email"
          class="h-12 w-full rounded-full border border-cp-border bg-transparent px-5 text-[15px] text-cp-text outline-none transition placeholder:text-cp-muted focus:border-cp-text/60"
        />

        <button
          type="submit"
          [disabled]="!email().trim()"
          class="h-12 w-full rounded-full bg-cp-text text-[15px] font-medium text-cp-bg transition hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-50"
        >
          Continue
        </button>
      </form>
    </div>
  </div>
}
