<aside
  class="flex h-full shrink-0 flex-col bg-cp-bg text-cp-text transition-[width] duration-200 ease-out"
  [class.w-64]="!ui.collapsed()"
  [class.w-14]="ui.collapsed()"
>
  <div
    class="flex items-center pt-4 pb-3"
    [class.px-4]="!ui.collapsed()"
    [class.justify-between]="!ui.collapsed()"
    [class.justify-center]="ui.collapsed()"
  >
    @if (!ui.collapsed()) {
      <span class="text-sm font-semibold">Copilot</span>
    }
    <button
      type="button"
      (click)="ui.toggleCollapsed()"
      class="rounded-md p-1.5 text-cp-muted transition hover:bg-cp-bg-2 hover:text-cp-text"
      [attr.aria-label]="ui.collapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
        <rect x="3" y="4" width="18" height="16" rx="2" />
        <line x1="9" y1="4" x2="9" y2="20" />
      </svg>
    </button>
  </div>

  <nav class="px-2">
    <button
      type="button"
      (click)="chat.newConversation()"
      class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm text-cp-text transition hover:bg-cp-bg-2"
      [class.justify-center]="ui.collapsed()"
      [attr.title]="ui.collapsed() ? 'New chat' : null"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0">
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
      </svg>
      @if (!ui.collapsed()) {<span>New chat</span>}
    </button>

    <button
      type="button"
      class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm text-cp-text transition hover:bg-cp-bg-2"
      [class.justify-center]="ui.collapsed()"
      [attr.title]="ui.collapsed() ? 'Library' : null"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
      </svg>
      @if (!ui.collapsed()) {<span>Library</span>}
    </button>

    <button
      type="button"
      class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm text-cp-text transition hover:bg-cp-bg-2"
      [class.justify-center]="ui.collapsed()"
      [attr.title]="ui.collapsed() ? 'Tasks' : null"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0">
        <path d="M9 11l3 3 8-8" />
        <path d="M20 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9" />
      </svg>
      @if (!ui.collapsed()) {
        <span class="flex-1 text-left">Tasks</span>
        <span class="rounded-md bg-pink-400/15 px-1.5 py-0.5 text-[10px] font-semibold tracking-wider text-pink-300">PREVIEW</span>
      }
    </button>

    <button
      type="button"
      class="group flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm text-cp-text transition hover:bg-cp-bg-2"
      [class.justify-center]="ui.collapsed()"
      [attr.title]="ui.collapsed() ? 'Projects' : null"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
      </svg>
      @if (!ui.collapsed()) {
        <span class="flex-1 text-left">Projects</span>
        <span
          class="rounded-md p-0.5 text-cp-muted opacity-0 transition group-hover:opacity-100 hover:bg-cp-bg-3 hover:text-cp-text"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="h-3.5 w-3.5">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </span>
      }
    </button>
  </nav>

  <div class="my-3 px-4">
    <div class="h-px bg-cp-border/60"></div>
  </div>

  <nav class="px-2">
    <button
      type="button"
      class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm text-cp-text transition hover:bg-cp-bg-2"
      [class.justify-center]="ui.collapsed()"
      [attr.title]="ui.collapsed() ? 'Discover' : null"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0">
        <circle cx="12" cy="12" r="10" />
        <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" />
      </svg>
      @if (!ui.collapsed()) {<span>Discover</span>}
    </button>

    <button
      type="button"
      class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm text-cp-text transition hover:bg-cp-bg-2"
      [class.justify-center]="ui.collapsed()"
      [attr.title]="ui.collapsed() ? 'Imagine' : null"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0">
        <circle cx="13.5" cy="6.5" r=".5" />
        <circle cx="17.5" cy="10.5" r=".5" />
        <circle cx="8.5" cy="7.5" r=".5" />
        <circle cx="6.5" cy="12.5" r=".5" />
        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c3.31 0 6-2.69 6-6 0-4.96-4.49-9-10-9z" />
      </svg>
      @if (!ui.collapsed()) {<span>Imagine</span>}
    </button>

    <button
      type="button"
      class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm text-cp-text transition hover:bg-cp-bg-2"
      [class.justify-center]="ui.collapsed()"
      [attr.title]="ui.collapsed() ? 'Experiments' : null"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0">
        <path d="M10 2v6L4.5 18.5A2 2 0 0 0 6.21 22h11.58a2 2 0 0 0 1.71-3.5L14 8V2" />
        <line x1="8" y1="2" x2="16" y2="2" />
      </svg>
      @if (!ui.collapsed()) {<span>Experiments</span>}
    </button>
  </nav>

  @if (!ui.collapsed()) {
    <div class="cp-scroll mt-2 flex-1 overflow-y-auto px-2">
      <div class="pt-2 pb-1">
        @for (conv of chat.conversations(); track conv.id) {
          <button
            type="button"
            (click)="chat.selectConversation(conv.id)"
            class="block w-full truncate rounded-lg px-3 py-1.5 text-left text-[13px] text-cp-text/85 transition hover:bg-cp-bg-2"
            [class.bg-cp-bg-2]="conv.id === chat.activeId()"
            [class.text-cp-text]="conv.id === chat.activeId()"
          >
            {{ conv.title }}
          </button>
        }
      </div>
    </div>
  } @else {
    <div class="flex-1"></div>
  }

  <div
    class="flex items-center gap-2 py-3"
    [class.px-3]="!ui.collapsed()"
    [class.justify-center]="ui.collapsed()"
  >
    @if (ui.collapsed()) {
      <button
        type="button"
        class="flex h-9 w-9 items-center justify-center rounded-full bg-gradient-to-br from-amber-400 to-rose-500 text-sm font-semibold text-white"
        [attr.title]="chat.userName()"
      >
        {{ chat.userName().charAt(0) }}
      </button>
    } @else {
      <div
        class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-amber-400 to-rose-500 text-sm font-semibold text-white"
      >
        {{ chat.userName().charAt(0) }}
      </div>
      <div class="min-w-0 flex-1 leading-tight">
        <div class="truncate text-[13px] font-medium text-cp-text">{{ chat.userName() }}</div>
        <div class="truncate text-[11px] text-cp-muted">{{ chat.plan() }}</div>
      </div>
      <button
        type="button"
        (click)="ui.toggleTheme()"
        class="rounded-md p-1.5 text-cp-muted transition hover:bg-cp-bg-2 hover:text-cp-text"
        [attr.aria-label]="ui.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        @if (ui.theme() === 'dark') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        }
      </button>
      <button
        type="button"
        class="rounded-md border border-cp-border px-2.5 py-1 text-xs text-cp-text transition hover:bg-cp-bg-2"
      >
        Upgrade
      </button>
    }
  </div>
</aside>
